<div id="header-container">
    <header>
        <div class="header-top" id="header-top">
            <div style="padding: auto;">
                <button onclick="toggleSidebar()" class="sidebar-toggle" id="sidebar-toggle">
                    <picture>
                        <img src="/images/icons/tree-of-life-white.png" alt="Toggle Sidebar" style="width: 50px;" />
                    </picture>
                </button>

                <div class="lang-dropdown" >
                    <button id="language-toggle"></button>
                    <ul id="language-menu" style="z-index: 9999;"></ul>
                </div>
            </div>
            
            <div class="site-title">
                <a id="home-btn">Home</a>
            </div>
            <div class="site-title">
                <a id="map-btn">Map</a>
            </div>
            <div class="site-title">
                <a id="journal-btn">Journal</a>
            </div>
            <div class="site-title">
                <a id="quiz-btn">Quiz</a>
            </div>

            <div id="search-container">
                <input type="text" id="search-input" placeholder="Search" autocomplete="off" />
                <ul id="search-results"></ul>
            </div>

            <button class="header-share-btn" id="share-page-button" title="Share" aria-label="Share"
                    onclick="shareLink(window.location.href, document.title)"><svg viewBox="0 0 24 24" aria-hidden="true" focusable="false" fill="currentColor"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg></button>
        </div>

        

        <nav class="breadcrumbs" id="navpath"></nav>
    </header>
</div>

<div id="sidebar-overlay" class="overlay hidden" onclick="closeSidebar()"></div>
<div id="sidebar" class="sidebar collapsed">
  <div id="tree-container"></div>
</div>
